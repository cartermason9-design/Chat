      }

      function setActiveApp(appName) {
        const isChess = appName === "chess";

        chatView.classList.toggle("hidden", isChess);
        chessView.classList.toggle("hidden", !isChess);
        chessAppButton.classList.toggle("active", isChess);
        chatAppButton.classList.toggle("active", !isChess);

        if (isChess) {
          chessInput.focus();
        } else {
          input.focus();
        }
      }

      const files = ["a", "b", "c", "d", "e", "f", "g", "h"];
      const pieceValues = {
        p: 100,
        n: 320,
        b: 330,
        r: 500,
        q: 900,
        k: 20000,
      };
      const mateScore = 1000000;
      const engineTimeLimitMs = 650;
      const maxEngineDepth = 4;
      const strongEngineTimeLimitMs = 2000;
      const strongEngineDepth = 8;
      const transpositionTable = new Map();
      const pieceSquareTables = {
        p: [
          [0, 0, 0, 0, 0, 0, 0, 0],
          [50, 50, 50, 50, 50, 50, 50, 50],
          [10, 10, 20, 30, 30, 20, 10, 10],
          [5, 5, 10, 25, 25, 10, 5, 5],
          [0, 0, 0, 20, 20, 0, 0, 0],
          [5, -5, -10, 0, 0, -10, -5, 5],
          [5, 10, 10, -20, -20, 10, 10, 5],
          [0, 0, 0, 0, 0, 0, 0, 0],
        ],
        n: [
          [-50, -40, -30, -30, -30, -30, -40, -50],
          [-40, -20, 0, 5, 5, 0, -20, -40],
          [-30, 5, 10, 15, 15, 10, 5, -30],
          [-30, 0, 15, 20, 20, 15, 0, -30],
          [-30, 5, 15, 20, 20, 15, 5, -30],
          [-30, 0, 10, 15, 15, 10, 0, -30],
          [-40, -20, 0, 0, 0, 0, -20, -40],
          [-50, -40, -30, -30, -30, -30, -40, -50],
        ],
        b: [
          [-20, -10, -10, -10, -10, -10, -10, -20],
          [-10, 5, 0, 0, 0, 0, 5, -10],
          [-10, 10, 10, 10, 10, 10, 10, -10],
          [-10, 0, 10, 10, 10, 10, 0, -10],
          [-10, 5, 5, 10, 10, 5, 5, -10],
          [-10, 0, 5, 10, 10, 5, 0, -10],
          [-10, 0, 0, 0, 0, 0, 0, -10],
          [-20, -10, -10, -10, -10, -10, -10, -20],
        ],
        r: [
          [0, 0, 0, 5, 5, 0, 0, 0],
          [5, 10, 10, 10, 10, 10, 10, 5],
          [-5, 0, 0, 0, 0, 0, 0, -5],
          [-5, 0, 0, 0, 0, 0, 0, -5],
          [-5, 0, 0, 0, 0, 0, 0, -5],
          [-5, 0, 0, 0, 0, 0, 0, -5],
          [-5, 0, 0, 0, 0, 0, 0, -5],
          [0, 0, 0, 5, 5, 0, 0, 0],
        ],
        q: [
          [-20, -10, -10, -5, -5, -10, -10, -20],
          [-10, 0, 5, 0, 0, 0, 0, -10],
          [-10, 5, 5, 5, 5, 5, 0, -10],
          [0, 0, 5, 5, 5, 5, 0, -5],
          [-5, 0, 5, 5, 5, 5, 0, -5],
          [-10, 0, 5, 5, 5, 5, 0, -10],
          [-10, 0, 0, 0, 0, 0, 0, -10],
          [-20, -10, -10, -5, -5, -10, -10, -20],
        ],
        k: [
          [-30, -40, -40, -50, -50, -40, -40, -30],
          [-30, -40, -40, -50, -50, -40, -40, -30],
          [-30, -40, -40, -50, -50, -40, -40, -30],
          [-30, -40, -40, -50, -50, -40, -40, -30],
          [-20, -30, -30, -40, -40, -30, -30, -20],
          [-10, -20, -20, -20, -20, -20, -20, -10],
          [20, 20, 0, 0, 0, 0, 20, 20],
          [20, 30, 10, 0, 0, 10, 30, 20],
        ],
      };

      const chessState = {
        board: createStartingBoard(),
        turn: "w",
        selected: null,
        legalMoves: [],
        lastMove: null,
        gameOver: false,
        captured: {
          w: [],
          b: [],
        },
        castling: {
          w: { k: true, q: true },
          b: { k: true, q: true },
        },
        enPassant: null,
        dragging: null,
        ignoreNextBoardClick: false,
        repetitionCounts: new Map(),
      };

      function createStartingBoard() {
        return [
          ["br", "bn", "bb", "bq", "bk", "bb", "bn", "br"],
          ["bp", "bp", "bp", "bp", "bp", "bp", "bp", "bp"],
          ["", "", "", "", "", "", "", ""],
          ["", "", "", "", "", "", "", ""],
          ["", "", "", "", "", "", "", ""],
          ["", "", "", "", "", "", "", ""],
          ["wp", "wp", "wp", "wp", "wp", "wp", "wp", "wp"],
          ["wr", "wn", "wb", "wq", "wk", "wb", "wn", "wr"],
        ];
      }

      function cloneBoard(board) {
        return board.map((row) => row.slice());
      }

      function inBounds(row, col) {
        return row >= 0 && row < 8 && col >= 0 && col < 8;
      }

      function opposite(color) {
        return color === "w" ? "b" : "w";
      }

      function squareName(row, col) {
        return `${files[col]}${8 - row}`;
      }

      function sameSquare(a, b) {
        return a && b && a.row === b.row && a.col === b.col;
      }

      function findKing(board, color) {
        for (let row = 0; row < 8; row++) {
          for (let col = 0; col < 8; col++) {
            if (board[row][col] === `${color}k`) {
              return { row, col };
            }
          }
        }

        return null;
      }

      function isSquareAttacked(board, row, col, byColor) {
        const pawnDirection = byColor === "w" ? -1 : 1;
        const pawnRow = row - pawnDirection;

        for (const pawnCol of [col - 1, col + 1]) {
          if (
            inBounds(pawnRow, pawnCol) &&
            board[pawnRow][pawnCol] === `${byColor}p`
          ) {
            return true;
          }
        }

        const knightJumps = [
          [-2, -1],
          [-2, 1],
          [-1, -2],
          [-1, 2],
          [1, -2],
          [1, 2],
          [2, -1],
          [2, 1],
        ];

        for (const [dr, dc] of knightJumps) {
          const piece = board[row + dr]?.[col + dc];

          if (piece === `${byColor}n`) {
            return true;
          }
        }

        const diagonalDirections = [
          [-1, -1],
          [-1, 1],
          [1, -1],
          [1, 1],
        ];
        const straightDirections = [
          [-1, 0],
          [1, 0],
          [0, -1],
          [0, 1],
        ];

        for (const [dr, dc] of diagonalDirections) {
          let nextRow = row + dr;
          let nextCol = col + dc;

          while (inBounds(nextRow, nextCol)) {
            const piece = board[nextRow][nextCol];

            if (piece) {
              if (
                piece[0] === byColor &&
                (piece[1] === "b" || piece[1] === "q")
              ) {
                return true;
              }

              break;
            }

            nextRow += dr;
            nextCol += dc;
          }
        }

        for (const [dr, dc] of straightDirections) {
          let nextRow = row + dr;
          let nextCol = col + dc;

          while (inBounds(nextRow, nextCol)) {
            const piece = board[nextRow][nextCol];

            if (piece) {
              if (
                piece[0] === byColor &&
                (piece[1] === "r" || piece[1] === "q")
              ) {
                return true;
              }

              break;
            }

            nextRow += dr;
            nextCol += dc;
          }
        }

        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) {
              continue;
            }

            const piece = board[row + dr]?.[col + dc];

            if (piece === `${byColor}k`) {
              return true;
            }
          }
        }

        return false;
      }

      function isInCheck(board, color) {
        const king = findKing(board, color);

        return (
          king &&
          isSquareAttacked(board, king.row, king.col, opposite(color))
        );
      }

      function addPromotionMoves(moves, move, color, toRow) {
        const promotionRow = color === "w" ? 0 : 7;

        if (toRow === promotionRow) {
          ["q", "r", "b", "n"].forEach((piece) => {
            moves.push({ ...move, promotion: piece });
          });
        } else {
          moves.push(move);
        }
      }

      function generatePseudoMoves(board, row, col, state, includeCastling) {
        const piece = board[row][col];
        const moves = [];

        if (!piece) {
          return moves;
        }

        const color = piece[0];
        const type = piece[1];
        const enemy = opposite(color);

        const pushMove = (toRow, toCol, extras = {}) => {
          if (!inBounds(toRow, toCol)) {
            return;
          }

          const target = board[toRow][toCol];

          if (!target || target[0] !== color) {
            moves.push({
              from: { row, col },
              to: { row: toRow, col: toCol },
              capture: Boolean(target),
              ...extras,
            });
          }
        };

        if (type === "p") {
          const direction = color === "w" ? -1 : 1;
          const startRow = color === "w" ? 6 : 1;
          const oneStep = row + direction;
          const twoStep = row + direction * 2;

          if (inBounds(oneStep, col) && !board[oneStep][col]) {
            addPromotionMoves(
              moves,
              {
                from: { row, col },
                to: { row: oneStep, col },
              },
              color,
              oneStep
            );

            if (row === startRow && !board[twoStep][col]) {
              moves.push({
                from: { row, col },
                to: { row: twoStep, col },
                doublePawn: true,
              });
            }
          }

          for (const captureCol of [col - 1, col + 1]) {
            if (!inBounds(oneStep, captureCol)) {
              continue;
            }

            const target = board[oneStep][captureCol];
            const enPassantTarget = state.enPassant;

            if (target && target[0] === enemy) {
              addPromotionMoves(
                moves,
                {
                  from: { row, col },
                  to: { row: oneStep, col: captureCol },
                  capture: true,
                },
                color,
                oneStep
              );
            } else if (
              enPassantTarget &&
              enPassantTarget.row === oneStep &&
              enPassantTarget.col === captureCol
            ) {
              moves.push({
                from: { row, col },
                to: { row: oneStep, col: captureCol },
                capture: true,
                enPassant: true,
              });
            }
          }
        }

        if (type === "n") {
          [
            [-2, -1],
            [-2, 1],
            [-1, -2],
            [-1, 2],
            [1, -2],
            [1, 2],
            [2, -1],
            [2, 1],
          ].forEach(([dr, dc]) => pushMove(row + dr, col + dc));
        }

        if (type === "b" || type === "r" || type === "q") {
          const directions = [];

          if (type === "b" || type === "q") {
            directions.push([-1, -1], [-1, 1], [1, -1], [1, 1]);
          }

          if (type === "r" || type === "q") {
            directions.push([-1, 0], [1, 0], [0, -1], [0, 1]);
          }

          directions.forEach(([dr, dc]) => {
            let nextRow = row + dr;
            let nextCol = col + dc;

            while (inBounds(nextRow, nextCol)) {
              const target = board[nextRow][nextCol];

              if (!target) {
                pushMove(nextRow, nextCol);
              } else {
                if (target[0] !== color) {
                  pushMove(nextRow, nextCol);
                }

                break;
              }

              nextRow += dr;
              nextCol += dc;
            }
          });
        }

        if (type === "k") {
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr !== 0 || dc !== 0) {
                pushMove(row + dr, col + dc);
              }
            }
          }

          if (
            includeCastling &&
            !isInCheck(board, color) &&
            state.castling[color]
          ) {
            const homeRow = color === "w" ? 7 : 0;

            if (
              row === homeRow &&
              col === 4 &&
              state.castling[color].k &&
              board[homeRow][5] === "" &&
              board[homeRow][6] === "" &&
              board[homeRow][7] === `${color}r` &&
              !isSquareAttacked(board, homeRow, 5, enemy) &&
              !isSquareAttacked(board, homeRow, 6, enemy)
            ) {
              moves.push({
                from: { row, col },
                to: { row: homeRow, col: 6 },
                castle: "k",
              });
            }

            if (
              row === homeRow &&
              col === 4 &&
              state.castling[color].q &&
              board[homeRow][1] === "" &&
              board[homeRow][2] === "" &&
              board[homeRow][3] === "" &&
              board[homeRow][0] === `${color}r` &&
              !isSquareAttacked(board, homeRow, 3, enemy) &&
              !isSquareAttacked(board, homeRow, 2, enemy)
            ) {
              moves.push({
                from: { row, col },
                to: { row: homeRow, col: 2 },
                castle: "q",
              });
            }
          }
        }

        return moves;
      }

      function applyMoveToBoard(board, move) {
        const nextBoard = cloneBoard(board);
        const piece = nextBoard[move.from.row][move.from.col];

        nextBoard[move.from.row][move.from.col] = "";

        if (move.enPassant) {
          nextBoard[move.from.row][move.to.col] = "";
        }

        if (move.castle === "k") {
          nextBoard[move.to.row][5] = nextBoard[move.to.row][7];
          nextBoard[move.to.row][7] = "";
        }

        if (move.castle === "q") {
          nextBoard[move.to.row][3] = nextBoard[move.to.row][0];
          nextBoard[move.to.row][0] = "";
        }

        nextBoard[move.to.row][move.to.col] = move.promotion
          ? `${piece[0]}${move.promotion}`
          : piece;

        return nextBoard;
      }

      function generateLegalMovesForSquare(board, row, col, state) {
        const piece = board[row][col];

        if (!piece) {
          return [];
        }

        return generatePseudoMoves(board, row, col, state, true).filter(
          (move) => !isInCheck(applyMoveToBoard(board, move), piece[0])
        );
      }

      function getAllLegalMoves(color, state = chessState) {
        const moves = [];

        for (let row = 0; row < 8; row++) {
          for (let col = 0; col < 8; col++) {
            if (state.board[row][col]?.[0] === color) {
              moves.push(
                ...generateLegalMovesForSquare(
                  state.board,
                  row,
                  col,
                  state
                )
              );
            }
          }
        }

        return moves;
      }

      function updateCastlingRights(move, piece, capturedPiece) {
        const color = piece[0];

        if (piece[1] === "k") {
          chessState.castling[color].k = false;
          chessState.castling[color].q = false;
        }

        if (piece[1] === "r") {
          if (move.from.row === 7 && move.from.col === 0) {
            chessState.castling.w.q = false;
          }

          if (move.from.row === 7 && move.from.col === 7) {
            chessState.castling.w.k = false;
          }

          if (move.from.row === 0 && move.from.col === 0) {
            chessState.castling.b.q = false;
          }

          if (move.from.row === 0 && move.from.col === 7) {
            chessState.castling.b.k = false;
          }
        }

        if (capturedPiece?.[1] === "r") {
          if (move.to.row === 7 && move.to.col === 0) {
            chessState.castling.w.q = false;
          }

          if (move.to.row === 7 && move.to.col === 7) {
            chessState.castling.w.k = false;
          }

          if (move.to.row === 0 && move.to.col === 0) {
            chessState.castling.b.q = false;
          }

          if (move.to.row === 0 && move.to.col === 7) {
            chessState.castling.b.k = false;
          }
        }
      }

      function describeMove(move, piece) {
        const pieceName = {
          p: "Pawn",
          n: "Knight",
          b: "Bishop",
          r: "Rook",
          q: "Queen",
          k: "King",
        }[piece[1]];

        if (move.castle === "k") {
          return `${piece[0] === "w" ? "You" : "Black"} castled kingside.`;
        }

        if (move.castle === "q") {
          return `${piece[0] === "w" ? "You" : "Black"} castled queenside.`;
        }

        return `${piece[0] === "w" ? "You" : "Black"} moved ${pieceName} ${squareName(move.from.row, move.from.col)} to ${squareName(move.to.row, move.to.col)}${move.promotion ? ` and promoted to ${move.promotion.toUpperCase()}` : ""}.`;
      }

      function materialBalance() {
        let white = 0;
        let black = 0;

        for (const row of chessState.board) {
          for (const piece of row) {
            if (!piece || piece[1] === "k") {
              continue;
            }

            if (piece[0] === "w") {
              white += pieceValues[piece[1]];
            } else {
              black += pieceValues[piece[1]];
            }
          }
        }

        return Math.round((white - black) / 100);
      }

      function formatMaterialScore(score) {
        return score > 0 ? `+${score}` : `${score}`;
      }

      function renderCapturedPieces(container, capturedPieces) {
        container.innerHTML = "";

        capturedPieces
          .slice()
          .sort((a, b) => pieceValues[b[1]] - pieceValues[a[1]])
          .forEach((pieceCode) => {
            const piece = document.createElement("img");
            const pieceColor = pieceCode[0] === "w" ? "White" : "Black";

            piece.className = "captured-piece";
            piece.src = `pieces/${pieceColor}/${pieceCode}.png`;
            piece.alt = pieceCode;
            piece.title = pieceCode;

            container.appendChild(piece);
          });
      }

      function updatePlayerMaterialDisplays() {
        const whiteBalance = materialBalance();

        renderCapturedPieces(youCaptured, chessState.captured.w);
        renderCapturedPieces(aiCaptured, chessState.captured.b);

        youMaterial.textContent = formatMaterialScore(whiteBalance);
        aiMaterial.textContent = formatMaterialScore(-whiteBalance);
      }

      function updateEvaluationBar() {
        const blackCentipawnScore = evaluateBoard(chessState.board);
        const whitePawns = -blackCentipawnScore / 100;
        const cappedWhitePawns = Math.max(-8, Math.min(8, whitePawns));
        const whitePercent = 50 + (cappedWhitePawns / 8) * 50;
        const blackPercent = 100 - whitePercent;

        evalBlack.style.height = `${blackPercent}%`;
        evalScore.textContent =
          Math.abs(whitePawns) < 0.05
            ? "0.0"
            : `${whitePawns > 0 ? "+" : ""}${whitePawns.toFixed(1)}`;
      }

      function commitMove(move, feedbackText = "") {
        const piece = chessState.board[move.from.row][move.from.col];
        const capturedPiece = move.enPassant
          ? chessState.board[move.from.row][move.to.col]
          : chessState.board[move.to.row][move.to.col];

        updateCastlingRights(move, piece, capturedPiece);

        if (capturedPiece) {
          chessState.captured[piece[0]].push(capturedPiece);
        }

        chessState.board = applyMoveToBoard(chessState.board, move);
        chessState.enPassant = move.doublePawn
          ? {
              row: (move.from.row + move.to.row) / 2,
              col: move.from.col,
            }
          : null;
        chessState.lastMove = move;
        chessState.selected = null;
        chessState.legalMoves = [];
        chessState.turn = opposite(chessState.turn);
        recordCurrentPosition();

        addChessMessage(piece[0] === "w" ? "user" : "ai", describeMove(move, piece));
        if (feedbackText) {
          addChessMessage("ai", feedbackText);
        }
        updatePlayerMaterialDisplays();
        updateEvaluationBar();
        renderChessBoard();
        updateGameStatus();
      }

      function updateGameStatus() {
        const legalMoves = getAllLegalMoves(chessState.turn);

        if (legalMoves.length > 0) {
          if (isInCheck(chessState.board, chessState.turn)) {
            addChessMessage(
              "ai",
              `${chessState.turn === "w" ? "White" : "Black"} is in check.`
            );
          }

          return false;
        }

        chessState.gameOver = true;

        if (isInCheck(chessState.board, chessState.turn)) {
          addChessMessage(
            "ai",
            `${chessState.turn === "w" ? "White" : "Black"} is checkmated.`
          );
        } else {
          addChessMessage("ai", "Stalemate.");
        }

        return true;
      }

      function findMatchingMove(from, to, promotion) {
        return chessState.legalMoves.find((move) => {
          const sameFrom = sameSquare(move.from, from);
          const sameTo = sameSquare(move.to, to);
          const samePromotion =
            !move.promotion || !promotion || move.promotion === promotion;

          return sameFrom && sameTo && samePromotion;
        });
      }

      function askPromotionChoice() {
        const choice = window
          .prompt("Promote to queen, rook, bishop, or knight? (q/r/b/n)", "q")
          ?.trim()
          .toLowerCase();

        return ["q", "r", "b", "n"].includes(choice) ? choice : "q";
      }

      function choosePromotionMove(moves) {
        if (moves.length <= 1 || !moves[0].promotion) {
          return moves[0];
        }

        const choice = askPromotionChoice();

        return moves.find((move) => move.promotion === choice) || moves[0];
      }

      function movesMatch(a, b) {
        return (
          a &&
          b &&
          sameSquare(a.from, b.from) &&
          sameSquare(a.to, b.to) &&
          (a.promotion || "") === (b.promotion || "")
        );
      }

      function moveNotation(move) {
        return `${squareName(move.from.row, move.from.col)}-${squareName(
          move.to.row,
          move.to.col
        )}${move.promotion ? `=${move.promotion.toUpperCase()}` : ""}`;
      }

      function whiteEvalFromScore(score) {
        if (Math.abs(score) > mateScore / 2) {
          return score > 0 ? -100 : 100;
        }

        return -score / 100;
      }

      function createAnalysisSnapshot() {
        return {
          board: cloneBoard(chessState.board),
          turn: "w",
          castling: cloneCastling(chessState.castling),
          enPassant: chessState.enPassant
            ? { ...chessState.enPassant }
            : null,
        };
      }

      function analyzeWhiteMove(move, rootState) {
        const legalMoves = orderedMoves(rootState);
        const deadline = performance.now() + 220;
        let bestMove = legalMoves[0];
        let bestScore = Infinity;
        let chosenScore = null;

        for (const candidate of legalMoves) {
          const score = alphaBeta(
            createSearchState(rootState, candidate),
            2,
            -Infinity,
            Infinity,
            deadline
          );

          if (movesMatch(candidate, move)) {
            chosenScore = score;
          }

          if (score < bestScore) {
            bestScore = score;
            bestMove = candidate;
          }

          if (performance.now() > deadline) {
            break;
          }
        }

        if (chosenScore === null) {
          chosenScore = alphaBeta(
            createSearchState(rootState, move),
            1,
            -Infinity,
            Infinity,
            deadline
          );
        }

        const chosenWhiteEval = whiteEvalFromScore(chosenScore);
        const bestWhiteEval = whiteEvalFromScore(bestScore);
        const loss = bestWhiteEval - chosenWhiteEval;
        const capturedPiece = getCapturedPiece(rootState, move);
        const movedPiece = rootState.board[move.from.row][move.from.col];
        const afterPlayerMove = createSearchState(rootState, move);
        const blackReplies = orderedMoves(afterPlayerMove);
        const blackMateReply = blackReplies.find((reply) => {
          const afterReply = createSearchState(afterPlayerMove, reply);

          return (
            isInCheck(afterReply.board, "w") &&
            getAllLegalMoves("w", afterReply).length === 0
          );
        });
        const biggestFreeMaterialLoss = blackReplies.reduce((best, reply) => {
          const replyCapture = getCapturedPiece(afterPlayerMove, reply);

          if (!replyCapture || replyCapture[0] !== "w") {
            return best;
          }

          const afterReply = createSearchState(afterPlayerMove, reply);
          const whiteCanRecapture = getAllLegalMoves("w", afterReply).some(
            (whiteReply) =>
              whiteReply.to.row === reply.to.row &&
              whiteReply.to.col === reply.to.col &&
              getCapturedPiece(afterReply, whiteReply)?.[0] === "b"
          );

          if (whiteCanRecapture) {
            return best;
          }

          return Math.max(best, pieceValues[replyCapture[1]] / 100);
        }, 0);
        const gavePiece =
          !capturedPiece &&
          movedPiece?.[1] !== "p" &&
          loss >= pieceValues[movedPiece[1]] / 100 - 0.35;
        const isBest = movesMatch(move, bestMove);
        const isCriticalOnlyMove =
          isBest &&
          legalMoves.filter((candidate) => {
            const score = alphaBeta(
              createSearchState(rootState, candidate),
              1,
              -Infinity,
              Infinity,
              deadline
            );

            return bestWhiteEval - whiteEvalFromScore(score) <= 0.35;
          }).length === 1;
        let label = "";
        let detail = "";

        if (blackMateReply) {
          label = "That is a blunder.";
          detail = `It allows checkmate with ${moveNotation(blackMateReply)}.`;
        } else if (biggestFreeMaterialLoss >= 5 || gavePiece || loss >= 3.0) {
          label = "That is a blunder.";
          detail = "It gives up too much material or position for free.";
        } else if (biggestFreeMaterialLoss >= 3) {
          label = "That is a mistake.";
          detail = "It lets Black win a major piece without enough compensation.";
        } else if (loss >= 1.6) {
          label = "That is a mistake.";
          detail = "The position gets a lot worse compared with the engine move.";
        } else if (loss >= 0.75) {
          label = "That is an inaccuracy.";
          detail = "You had a better move.";
        } else if (loss >= 0.3) {
          label = "That is a good move.";
          detail = "It is playable, but not one of the engine's top choices.";
        } else if (isCriticalOnlyMove || (capturedPiece && isBest && bestWhiteEval > 0.8)) {
          label = "That is a Great Move.";
          detail = "You found a critical move, like winning material or solving the position.";
        } else if (isBest) {
          label = "That is the best move.";
          detail = "I would have played that move.";
        } else {
          label = "That is an excellent move.";
          detail = "It is very close to the best move.";
        }

        return `${label} ${detail} Best idea: ${moveNotation(bestMove)}.`;
      }

      function selectSquare(row, col) {
        if (chessState.gameOver || chessState.turn !== "w") {
          return;
        }

        const piece = chessState.board[row][col];

        if (piece?.[0] === "w") {
          chessState.selected = { row, col };
          chessState.legalMoves = generateLegalMovesForSquare(
            chessState.board,
            row,
            col,
            chessState
          );
          renderChessBoard();
        }
      }

      function tryPlayerMove(toRow, toCol) {
        if (!chessState.selected) {
          return false;
        }

        const moves = chessState.legalMoves.filter(
          (move) => move.to.row === toRow && move.to.col === toCol
        );

        if (moves.length === 0) {
          return false;
        }

        const move = choosePromotionMove(moves);
        const analysisSnapshot = createAnalysisSnapshot();

        commitMove(move);

        if (!chessState.gameOver) {
          window.setTimeout(() => {
            addChessMessage("ai", analyzeWhiteMove(move, analysisSnapshot));

            if (!chessState.gameOver) {
              window.setTimeout(makeBlackMove, 120);
            }
          }, 30);
        }

        return true;
      }

      function refreshBoardHighlights() {
        chessBoard.querySelectorAll(".square").forEach((square) => {
          const row = Number(square.dataset.row);
          const col = Number(square.dataset.col);
          const moveForSquare = chessState.legalMoves.find(
            (move) => move.to.row === row && move.to.col === col
          );

          square.classList.toggle(
            "selected",
            sameSquare(chessState.selected, { row, col })
          );
          square.classList.toggle(
            "legal-move",
            Boolean(moveForSquare && !moveForSquare.capture)
          );
          square.classList.toggle(
            "capture-move",
            Boolean(moveForSquare?.capture)
          );
        });
      }

      function moveDragGhost(event) {
        if (!chessState.dragging) {
          return;
        }

        chessState.dragging.moved = true;
        chessState.dragging.piece.style.left = `${event.clientX}px`;
        chessState.dragging.piece.style.top = `${event.clientY}px`;
      }

      function finishPieceDrag(event) {
        if (!chessState.dragging) {
          return;
        }

        const dragging = chessState.dragging;
        const targetSquare = document
          .elementFromPoint(event.clientX, event.clientY)
          ?.closest(".square");

        dragging.piece.remove();
        chessState.dragging = null;
        chessState.ignoreNextBoardClick = true;

        window.removeEventListener("pointermove", moveDragGhost);
        window.removeEventListener("pointerup", finishPieceDrag);
        window.removeEventListener("pointercancel", finishPieceDrag);

        if (targetSquare) {
          chessState.selected = dragging.from;
          chessState.legalMoves = generateLegalMovesForSquare(
            chessState.board,
            dragging.from.row,
            dragging.from.col,
            chessState
          );

          const didMove = tryPlayerMove(
            Number(targetSquare.dataset.row),
            Number(targetSquare.dataset.col)
          );

          if (!didMove) {
            chessState.selected = null;
            chessState.legalMoves = [];
            renderChessBoard();
          }
        } else {
          chessState.selected = null;
          chessState.legalMoves = [];
          renderChessBoard();
        }

        window.setTimeout(() => {
          chessState.ignoreNextBoardClick = false;
        }, 0);
      }

      function startPieceDrag(event, row, col, pieceElement) {
        if (chessState.gameOver || chessState.turn !== "w") {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        chessState.selected = { row, col };
        chessState.legalMoves = generateLegalMovesForSquare(
          chessState.board,
          row,
          col,
          chessState
        );
        refreshBoardHighlights();

        pieceElement.className = "drag-piece";
        pieceElement.removeAttribute("draggable");
        pieceElement.style.left = `${event.clientX}px`;
        pieceElement.style.top = `${event.clientY}px`;
        document.body.appendChild(pieceElement);

        chessState.dragging = {
          from: { row, col },
          piece: pieceElement,
          moved: false,
        };

        window.addEventListener("pointermove", moveDragGhost);
        window.addEventListener("pointerup", finishPieceDrag);
        window.addEventListener("pointercancel", finishPieceDrag);
      }

      function handleSquareClick(row, col) {
        if (chessState.ignoreNextBoardClick) {
          return;
        }

        if (tryPlayerMove(row, col)) {
          return;
        }

        selectSquare(row, col);
      }

      function cloneCastling(castling) {
        return {
          w: { ...castling.w },
          b: { ...castling.b },
        };
      }

      function getCapturedPiece(state, move) {
        return move.enPassant
          ? state.board[move.from.row][move.to.col]
          : state.board[move.to.row][move.to.col];
      }

      function updateCastlingCopy(castling, move, piece, capturedPiece) {
        const nextCastling = cloneCastling(castling);
        const color = piece[0];

        if (piece[1] === "k") {
          nextCastling[color].k = false;
          nextCastling[color].q = false;
        }

        if (piece[1] === "r") {
          if (move.from.row === 7 && move.from.col === 0) {
            nextCastling.w.q = false;
          }

          if (move.from.row === 7 && move.from.col === 7) {
            nextCastling.w.k = false;
          }

          if (move.from.row === 0 && move.from.col === 0) {
            nextCastling.b.q = false;
          }

          if (move.from.row === 0 && move.from.col === 7) {
            nextCastling.b.k = false;
          }
        }

        if (capturedPiece?.[1] === "r") {
          if (move.to.row === 7 && move.to.col === 0) {
            nextCastling.w.q = false;
          }

          if (move.to.row === 7 && move.to.col === 7) {
            nextCastling.w.k = false;
          }

          if (move.to.row === 0 && move.to.col === 0) {
            nextCastling.b.q = false;
          }

          if (move.to.row === 0 && move.to.col === 7) {
            nextCastling.b.k = false;
          }
        }

        return nextCastling;
      }

      function createSearchState(state, move) {
        const piece = state.board[move.from.row][move.from.col];
        const capturedPiece = getCapturedPiece(state, move);

        return {
          board: applyMoveToBoard(state.board, move),
          turn: opposite(state.turn),
          castling: updateCastlingCopy(
            state.castling,
            move,
            piece,
            capturedPiece
          ),
          enPassant: move.doublePawn
            ? {
                row: (move.from.row + move.to.row) / 2,
                col: move.from.col,
              }
            : null,
        };
      }

      function evaluateBoard(board) {
        let score = 0;
        let whiteBishops = 0;
        let blackBishops = 0;

        for (let row = 0; row < 8; row++) {
          for (let col = 0; col < 8; col++) {
            const piece = board[row][col];

            if (!piece) {
              continue;
            }

            const color = piece[0];
            const type = piece[1];
            const tableRow = color === "w" ? row : 7 - row;
            const value =
              pieceValues[type] + pieceSquareTables[type][tableRow][col];

            score += color === "b" ? value : -value;

            if (piece === "wb") {
              whiteBishops++;
            }

            if (piece === "bb") {
              blackBishops++;
            }
          }
        }

        if (blackBishops >= 2) {
          score += 35;
        }

        if (whiteBishops >= 2) {
          score -= 35;
        }

        return score;
      }

      function evaluateStrong(state) {
        let score = evaluateBoard(state.board);
        const blackMobility = getAllLegalMoves("b", {
          ...state,
          turn: "b",
        }).length;
        const whiteMobility = getAllLegalMoves("w", {
          ...state,
          turn: "w",
        }).length;

        score += (blackMobility - whiteMobility) * 3;

        for (const color of ["w", "b"]) {
          const king = findKing(state.board, color);

          if (!king) {
            continue;
          }

          const enemy = opposite(color);
          let danger = 0;

          for (let row = king.row - 1; row <= king.row + 1; row++) {
            for (let col = king.col - 1; col <= king.col + 1; col++) {
              if (
                inBounds(row, col) &&
                isSquareAttacked(state.board, row, col, enemy)
              ) {
                danger += 1;
              }
            }
          }

          score += color === "b" ? -danger * 12 : danger * 12;
        }

        for (let row = 0; row < 8; row++) {
          for (let col = 0; col < 8; col++) {
            const piece = state.board[row][col];

            if (!piece || piece[1] === "k") {
              continue;
            }

            if (
              isSquareAttacked(state.board, row, col, opposite(piece[0])) &&
              !isSquareAttacked(state.board, row, col, piece[0])
            ) {
              score +=
                piece[0] === "b"
                  ? -pieceValues[piece[1]] * 0.18
                  : pieceValues[piece[1]] * 0.18;
            }
          }
        }

        return score;
      }

      function scoreMoveForOrdering(state, move) {
        const piece = state.board[move.from.row][move.from.col];
        const capturedPiece = getCapturedPiece(state, move);
        let score = 0;

        if (capturedPiece) {
          score +=
            pieceValues[capturedPiece[1]] * 10 - pieceValues[piece[1]];
        }

        if (move.promotion) {
          score += pieceValues[move.promotion] + 800;
        }

        if (move.castle) {
          score += 60;
        }

        const nextState = createSearchState(state, move);

        if (isInCheck(nextState.board, nextState.turn)) {
          score += 90;
        }

        return score;
      }

      function orderedMoves(state, capturesOnly = false) {
        return getAllLegalMoves(state.turn, state)
          .filter((move) => {
            if (!capturesOnly) {
              return true;
            }

            return move.capture || move.promotion;
          })
          .sort(
            (a, b) => scoreMoveForOrdering(state, b) - scoreMoveForOrdering(state, a)
          );
      }

      function hashState(state) {
        return `${state.turn}|${state.board
          .map((row) => row.map((piece) => piece || ".").join(""))
          .join("/")}|${state.castling.w.k ? "K" : ""}${
          state.castling.w.q ? "Q" : ""
        }${state.castling.b.k ? "k" : ""}${
          state.castling.b.q ? "q" : ""
        }|${state.enPassant ? `${state.enPassant.row},${state.enPassant.col}` : "-"}`;
      }

      function createRootState() {
        return {
          board: chessState.board,
          turn: chessState.turn,
          castling: chessState.castling,
          enPassant: chessState.enPassant,
        };
      }

      function recordCurrentPosition() {
        const key = hashState(createRootState());

        chessState.repetitionCounts.set(
          key,
          (chessState.repetitionCounts.get(key) || 0) + 1
        );
      }

      function moveRepeatsPosition(state, move) {
        const nextState = createSearchState(state, move);
        const nextKey = hashState(nextState);

        return (chessState.repetitionCounts.get(nextKey) || 0) > 0;
      }

      function repetitionAwareMoves(state) {
        const moves = orderedMoves(state);
        const blackIsWinning = evaluateBoard(state.board) >= 180;

        if (!blackIsWinning || moves.length <= 1) {
          return moves;
        }

        const nonRepeatingMoves = moves.filter(
          (move) => !moveRepeatsPosition(state, move)
        );

        return nonRepeatingMoves.length > 0 ? nonRepeatingMoves : moves;
      }

      function alphaBetaStrong(state, depth, alpha, beta, deadline) {
        if (performance.now() > deadline) {
          return evaluateStrong(state);
        }

        const key = `${hashState(state)}|${depth}`;
        const cached = transpositionTable.get(key);

        if (cached) {
          return cached;
        }

        const moves = orderedMoves(state);

        if (moves.length === 0) {
          if (isInCheck(state.board, state.turn)) {
            return state.turn === "b"
              ? -mateScore - depth
              : mateScore + depth;
          }

          return 0;
        }

        if (depth === 0) {
          return quiescence(state, alpha, beta, deadline);
        }

        let best = state.turn === "b" ? -Infinity : Infinity;

        for (const move of moves) {
          const nextState = createSearchState(state, move);
          const extension = isInCheck(nextState.board, nextState.turn) ? 1 : 0;
          const score = alphaBetaStrong(
            nextState,
            depth - 1 + extension,
            alpha,
            beta,
            deadline
          );

          if (state.turn === "b") {
            best = Math.max(best, score);
            alpha = Math.max(alpha, best);
          } else {
            best = Math.min(best, score);
            beta = Math.min(beta, best);
          }

          if (alpha >= beta) {
            break;
          }
        }

        if (transpositionTable.size > 60000) {
          transpositionTable.clear();
        }

        transpositionTable.set(key, best);

        return best;
      }

      function quiescence(state, alpha, beta, deadline) {
        if (performance.now() > deadline) {
          return evaluateBoard(state.board);
        }

        const standPat = evaluateBoard(state.board);

        if (state.turn === "b") {
          if (standPat >= beta) {
            return beta;
          }

          alpha = Math.max(alpha, standPat);

          for (const move of orderedMoves(state, true)) {
            const score = quiescence(
              createSearchState(state, move),
              alpha,
              beta,
              deadline
            );

            alpha = Math.max(alpha, score);

            if (alpha >= beta) {
              break;
            }
          }

          return alpha;
        }

        if (standPat <= alpha) {
          return alpha;
        }

        beta = Math.min(beta, standPat);

        for (const move of orderedMoves(state, true)) {
          const score = quiescence(
            createSearchState(state, move),
            alpha,
            beta,
            deadline
          );

          beta = Math.min(beta, score);

          if (alpha >= beta) {
            break;
          }
        }

        return beta;
      }

      function alphaBeta(state, depth, alpha, beta, deadline) {
        if (performance.now() > deadline) {
          return evaluateBoard(state.board);
        }

        const moves = orderedMoves(state);

        if (moves.length === 0) {
          if (isInCheck(state.board, state.turn)) {
            return state.turn === "b"
              ? -mateScore - depth
              : mateScore + depth;
          }

          return 0;
        }

        if (depth === 0) {
          return quiescence(state, alpha, beta, deadline);
        }

        if (state.turn === "b") {
          let best = -Infinity;

          for (const move of moves) {
            const score = alphaBeta(
              createSearchState(state, move),
              depth - 1,
              alpha,
              beta,
              deadline
            );

            best = Math.max(best, score);
            alpha = Math.max(alpha, best);

            if (alpha >= beta) {
              break;
            }
          }

          return best;
        }

        let best = Infinity;

        for (const move of moves) {
          const score = alphaBeta(
            createSearchState(state, move),
            depth - 1,
            alpha,
            beta,
            deadline
          );

          best = Math.min(best, score);
          beta = Math.min(beta, best);

          if (alpha >= beta) {
            break;
          }
        }

        return best;
      }

      function chooseBlackMove() {
        const rootState = createRootState();
        const deadline = performance.now() + engineTimeLimitMs;
        const rootMoves = repetitionAwareMoves(rootState);
        let bestMove = rootMoves[0];
        let bestScore = -Infinity;

        for (let depth = 1; depth <= maxEngineDepth; depth++) {
          if (performance.now() > deadline) {
            break;
          }

          let depthBestMove = bestMove;
          let depthBestScore = -Infinity;

          for (const move of rootMoves) {
            const score = alphaBeta(
              createSearchState(rootState, move),
              depth - 1,
              -Infinity,
              Infinity,
              deadline
            );

            if (performance.now() > deadline) {
              break;
            }

            if (score > depthBestScore) {
              depthBestScore = score;
              depthBestMove = move;
            }
          }

          if (performance.now() <= deadline && depthBestMove) {
            bestMove = depthBestMove;
            bestScore = depthBestScore;
          }
        }

        return bestMove || rootMoves[0];
      }

      function chooseStrongBlackMove() {
        const rootState = createRootState();
        const deadline = performance.now() + strongEngineTimeLimitMs;
        const rootMoves = repetitionAwareMoves(rootState);
        let bestMove = rootMoves[0];
        let bestScore = -Infinity;

        transpositionTable.clear();

        for (let depth = 1; depth <= strongEngineDepth; depth++) {
          if (performance.now() > deadline) {
            break;
          }

          let depthBestMove = bestMove;
          let depthBestScore = -Infinity;

          for (const move of rootMoves) {
            const score = alphaBetaStrong(
              createSearchState(rootState, move),
              depth - 1,
              -Infinity,
              Infinity,
              deadline
            );

            if (performance.now() > deadline) {
              break;
            }

            if (score > depthBestScore) {
              depthBestScore = score;
              depthBestMove = move;
            }
          }

          if (performance.now() <= deadline && depthBestMove) {
            bestMove = depthBestMove;
            bestScore = depthBestScore;
          }
        }

        return bestMove || rootMoves[0];
      }

      function makeBlackMove() {
        if (chessState.gameOver || chessState.turn !== "b") {
          return;
        }

        const moves = getAllLegalMoves("b");

        if (moves.length === 0) {
          updateGameStatus();
          return;
        }

        commitMove(
          engineMode === "strong" ? chooseStrongBlackMove() : chooseBlackMove()
        );
      }

      function renderChessBoard() {
        chessBoard.innerHTML = "";

        chessState.board.forEach((rankPieces, rowIndex) => {
          rankPieces.forEach((pieceCode, fileIndex) => {
            const square = document.createElement("div");
            const isLastMoveSquare =
              sameSquare(chessState.lastMove?.from, {
                row: rowIndex,
                col: fileIndex,
              }) ||
              sameSquare(chessState.lastMove?.to, {
                row: rowIndex,
                col: fileIndex,
              });
            const moveForSquare = chessState.legalMoves.find(
              (move) =>
                move.to.row === rowIndex && move.to.col === fileIndex
            );
            const squareColor =
              (rowIndex + fileIndex) % 2 === 0 ? "light" : "dark";

            square.className = `square ${squareColor}`;
            square.dataset.row = rowIndex;
            square.dataset.col = fileIndex;
            square.setAttribute("aria-label", squareName(rowIndex, fileIndex));

            if (
              sameSquare(chessState.selected, {
                row: rowIndex,
                col: fileIndex,
              })
            ) {
              square.classList.add("selected");
            }

            if (moveForSquare) {
              square.classList.add(
                moveForSquare.capture ? "capture-move" : "legal-move"
              );
            }

            if (isLastMoveSquare) {
              square.classList.add("last-move");
            }

            square.addEventListener("click", () => {
              handleSquareClick(rowIndex, fileIndex);
            });

            if (pieceCode) {
              const piece = document.createElement("img");
              const pieceColor =
                pieceCode[0] === "w" ? "White" : "Black";

              piece.className = "piece";
              piece.src = `pieces/${pieceColor}/${pieceCode}.png`;
              piece.alt = pieceCode;
              piece.title = `${pieceCode} on ${squareName(rowIndex, fileIndex)}`;
              piece.draggable = false;

              if (pieceCode[0] === "w" && chessState.turn === "w") {
                piece.classList.add("draggable");
                piece.addEventListener("pointerdown", (event) => {
                  startPieceDrag(event, rowIndex, fileIndex, piece);
                });
              }

              square.appendChild(piece);
            }

            chessBoard.appendChild(square);
          });
        });
      }

      function addChessMessage(role, text) {
        const message = document.createElement("div");

        message.className = `message-row ${role}`;
        message.innerHTML = `<div class="message ${role}"><div class="message-bubble"><div class="message-text"></div></div></div>`;
        renderChessMessageText(message.querySelector(".message-text"), text);

        chessMessages.appendChild(message);
        chessMessages.scrollTop = chessMessages.scrollHeight;
      }

      function renderChessMessageText(element, text) {
        const classifications = [
          { phrase: "That is a Great Move.", className: "great" },
          { phrase: "That is the best move.", className: "best" },
          { phrase: "That is an excellent move.", className: "excellent" },
          { phrase: "That is a good move.", className: "good" },
          { phrase: "That is an inaccuracy.", className: "inaccuracy" },
          { phrase: "That is a mistake.", className: "mistake" },
          { phrase: "That is a blunder.", className: "blunder" },
        ];
        const classification = classifications.find(({ phrase }) =>
          text.startsWith(phrase)
        );

        element.textContent = "";

        if (!classification) {
          element.textContent = text;
          return;
        }

        const label = document.createElement("span");

        label.className = `move-classification ${classification.className}`;
        label.textContent = classification.phrase;

        element.appendChild(label);
        element.appendChild(
          document.createTextNode(text.slice(classification.phrase.length))
        );
      }

      function sendChessMessage() {
        const userText = chessInput.value.trim();

        if (!userText || !isModelReady || isChessSending) {
          return;
        }

        addChessMessage("user", userText);

        chessInput.value = "";
        chessInput.disabled = true;
        isChessSending = true;

        fetch("./api/chat", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            message: `You are my chess coach. Use chess notation and explain clearly. ${userText}`,
            temperature: Number(temperatureInput.value),
          }),
        })
          .then(async (response) => {
            if (!response.ok) {
              throw new Error(
                `Chess chat request failed (${response.status})`
              );
            }

            const payload = await response.json();

            addChessMessage(
              "ai",
              payload.reply || "I do not have chess feedback right now."
            );
          })
          .catch((error) => {
            addChessMessage(
              "ai",
              "The local model server could not generate chess feedback."
            );

            console.error(error);
          })
          .finally(() => {
            isChessSending = false;
            chessInput.disabled = !isModelReady;
            chessInput.focus();
          });
      }

      async function addMessage(label, text, stream = false) {
  const role =
    label === "You"
      ? "user"
      : label === "AI"
      ? "ai"
      : "source";

  const row = document.createElement("div");
  row.className = `message-row ${role}`;

  const message = document.createElement("div");
  message.className = `message ${role}`;

  const bubble = document.createElement("div");
  bubble.className = "message-bubble";

  const content = document.createElement("div");
  content.className = "message-text";

  bubble.appendChild(content);

  message.appendChild(bubble);

  row.appendChild(message);

  messages.appendChild(row);

  container.classList.add("has-conversation");

  if (stream) {
    let currentText = "";

    for (let i = 0; i < text.length; i++) {
      currentText += text[i];

      content.textContent = currentText;

      messages.scrollTop = messages.scrollHeight;

      await new Promise((resolve) =>
        setTimeout(resolve, 12)
      );
    }
  } else {
    content.textContent = text;
  }

  if (role === "ai") {
    message.appendChild(createCopyButton(text));
  }

  messages.scrollTop = messages.scrollHeight;
}

function sendMessage() {
  const userText = input.value.trim();

  if (!userText || !isModelReady || isSending) {
    return;
  }

  addMessage("You", userText);

  input.value = "";

  isSending = true;
  input.disabled = true;

  fetch("./api/chat", {
    method: "POST",

    headers: {
      "Content-Type": "application/json",
    },

    body: JSON.stringify({
      message: userText,
      temperature: Number(temperatureInput.value),
    }),
  })
    .then(async (response) => {
      if (!response.ok) {
        throw new Error(
          `Chat request failed (${response.status})`
        );
      }

      const payload = await response.json();

      await addMessage(
        "AI",
        payload.reply || "I do not have a reply right now.",
        true
      );

      if (payload.source) {
        addMessage("Source", payload.source);
      }
    })
    .catch((error) => {
      addMessage(
        "AI",
        "The local model server could not generate a reply.",
        true
      );

      console.error(error);
    })
    .finally(() => {
      isSending = false;

      input.disabled = !isModelReady;

      input.focus();
    });
}

      temperatureInput.addEventListener("input", () => {
        temperatureValue.textContent = Number(
          temperatureInput.value
        ).toFixed(1);
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          sendMessage();
        }
      });

      document.querySelectorAll(".buttons button").forEach((button) => {
        button.addEventListener("click", () => {
          if (!isModelReady) {
            return;
          }

          input.value = button.textContent;

          sendMessage();
        });
      });

      chessAppButton.addEventListener("click", () => {
        setActiveApp("chess");
      });

      chatAppButton.addEventListener("click", () => {
        setActiveApp("chat");
      });

      function setEngineMode(mode) {
        engineMode = mode;
        fastEngineButton.classList.toggle("active", mode === "fast");
        strongEngineButton.classList.toggle("active", mode === "strong");
        addChessMessage(
          "ai",
          mode === "strong"
            ? "Strong engine enabled."
            : "Fast engine enabled."
        );
      }

      fastEngineButton.addEventListener("click", () => {
        setEngineMode("fast");
      });

      strongEngineButton.addEventListener("click", () => {
        setEngineMode("strong");
      });

      chessInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          sendChessMessage();
        }
      });

      renderChessBoard();
      updatePlayerMaterialDisplays();
      updateEvaluationBar();
      loadStatus();
    </script>
  </body>
</html>
